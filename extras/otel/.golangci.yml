version: "2"

issues:
    max-same-issues: 50

formatters:
    enable:
        - goimports
        - golines
        - gci
        - gofumpt
    settings:
        goimports:
            local-prefixes:
                - github.com/piusalfred/whatsapp/extras/otel
        golines:
            max-len: 120
        gci:
            sections:
                - standard
                - default
                - prefix(github.com/piusalfred/whatsapp)
                - localmodule
                - blank
                - dot
            no-inline-comments: true
            no-prefix-comments: true
            custom-order: true
        gofumpt:
            extra-rules: true
            module-path: github.com/piusalfred/whatsapp/extras/otel

linters:
    enable:
        - asasalint
        - asciicheck
        - bidichk
        - bodyclose
        - canonicalheader
        - copyloopvar
        - cyclop
        - decorder
        - depguard
        - dupl
        - durationcheck
        - errcheck
        - errname
        - errorlint
        - err113
        - exhaustive
        - exptostd
        - fatcontext
        - forbidigo
        - funlen
        - gocheckcompilerdirectives
        - gochecknoglobals
        - gochecknoinits
        - gochecksumtype
        - gocognit
        - goconst
        - gocritic
        - gocyclo
        - godot
        - gomoddirectives
        - goprintffuncname
        - gosec
        - govet
        - iface
        - ineffassign
        - intrange
        - loggercheck
        - makezero
        - mirror
        - mnd
        - nakedret
        - nilerr
        - nilnesserr
        - nilnil
        - noctx
        - nolintlint
        - nonamedreturns
        - nosprintfhostport
        - perfsprint
        - prealloc
        - predeclared
        - promlinter
        - protogetter
        - reassign
        - recvcheck
        - revive
        - rowserrcheck
        - sloglint
        - spancheck
        - sqlclosecheck
        - staticcheck
        - testableexamples
        - testifylint
        - testpackage
        - tparallel
        - unconvert
        - unparam
        - unused
        - usestdlibvars
        - usetesting
        - wastedassign
        - whitespace
        - decorder
        - prealloc
        - wrapcheck
        - thelper

    settings:
        cyclop:
            max-complexity: 30
            package-average: 10.0

        depguard:
            rules:
                deprecated:
                    files:
                        - "$all"
                    deny:
                        - pkg: github.com/golang/protobuf
                          desc: Use google.golang.org/protobuf instead
                        - pkg: github.com/satori/go.uuid
                          desc: Use github.com/google/uuid instead
                        - pkg: github.com/gofrs/uuid$
                          desc: Use github.com/gofrs/uuid/v5 or later
                non-test:
                    files:
                        - "!$test"
                    deny:
                        - pkg: math/rand$
                          desc: Use math/rand/v2 instead
                non-main:
                    files:
                        - "!**/main.go"
                    deny:
                        - pkg: log$
                          desc: Use log/slog instead

        errcheck:
            check-type-assertions: true

        exhaustive:
            check:
                - switch
                - map

        funlen:
            lines: 100
            statements: 50

        gochecksumtype:
            default-signifies-exhaustive: false

        gocognit:
            min-complexity: 20

        gocritic:
            disabled-checks:
                - commentedOutCode # noisy; commented-out code is legitimate during active development
                - hugeParam # size threshold is context-dependent; use nolint when genuinely needed
                - rangeValCopy # same as hugeParam; flag only when the copy is provably hot
            settings:
                captLocal:
                    paramsOnly: false
                underef:
                    skipRecvDeref: false

        govet:
            enable-all: true
            disable:
                - fieldalignment # reordering struct fields for alignment is rarely worth the readability cost
            settings:
                shadow:
                    strict: true

        mnd:
            ignored-functions:
                - args.Error
                - flag.Arg
                - flag.Duration.*
                - flag.Float.*
                - flag.Int.*
                - flag.Uint.*
                - os.Chmod
                - os.Mkdir.*
                - os.OpenFile
                - os.WriteFile
                - prometheus.ExponentialBuckets.*
                - prometheus.LinearBuckets

        nakedret:
            max-func-lines: 0

        nolintlint:
            allow-no-explanation: [funlen, gocognit, golines]
            require-explanation: true
            require-specific: true

        perfsprint:
            strconcat: false

        reassign:
            patterns:
                - ".*"

        rowserrcheck:
            packages:
                - github.com/jmoiron/sqlx

        sloglint:
            no-global: all
            context: scope

        staticcheck:
            checks:
                - all
                - -ST1000 # package comment not required
                - -ST1016 # receiver name consistency is enforced by revive
                - -QF1008 # omitting embedded fields from selectors harms readability

        usetesting:
            os-temp-dir: true

    exclusions:
        warn-unused: true
        presets:
            - std-error-handling
            - common-false-positives
        rules:
            - source: "TODO"
              linters: [godot]
            - text: "should have a package comment"
              linters: [revive]
            - text: 'exported \S+ \S+ should have comment( \(or a comment on this block\))? or be unexported'
              linters: [revive]
            - text: 'package comment should be of the form ".+"'
              source: "// ?(nolint|TODO)"
              linters: [revive]
            - text: 'comment on exported \S+ \S+ should be of the form ".+"'
              source: "// ?(nolint|TODO)"
              linters: [revive, staticcheck]
            - path: '_test\.go'
              linters:
                  - bodyclose
                  - dupl
                  - errcheck
                  - funlen
                  - goconst
                  - gosec
                  - noctx
                  - wrapcheck
                  - forbidigo
                  - govet
                  - revive
                  - gocognit
