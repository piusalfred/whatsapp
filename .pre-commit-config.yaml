# See https://pre-commit.com for more information
# Run `pre-commit autoupdate` to bump hook revisions to the latest.
repos:
  # ── Local hooks ──────────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: check
        name: Go Sanity Check
        description: Fast Go checks (license, format, lint, mod-tidy, build)
        language: system
        entry: make check
        pass_filenames: false
        types: [go]
      - id: bashate
        name: bashate
        description: Code style enforcement for bash programs
        language: system
        entry: bashate
        types: [shell]
        args: [--max-line-length, '120']
        # Install via: pip install bashate
  # ── Markdown ─────────────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        args: [--disable, MD013, MD033, MD041, --]
  # ── Shell scripts ────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
  # ── Secrets ──────────────────────────────────────────────────────────
  # gitleaks: fast regex-based secret detection (runs on staged changes)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  # truffleHog: deep entropy-based secret detection with live verification
  - repo: https://github.com/trufflesecurity/truffleHog
    rev: v3.95.7
    hooks:
      - id: trufflehog
  # ── YAML ─────────────────────────────────────────────────────────────
  - repo: https://github.com/google/yamlfmt
    # talisman: broad-scope secret scanner (checks all files including binaries).
    # Uncomment if you want a third scanner — gitleaks + truffleHog covers most cases.
    # - repo: https://github.com/thoughtworks/talisman
    #   rev: v1.32.0
    #   hooks:
    #     - id: talisman

    rev: v0.21.0
    hooks:
      - id: yamlfmt
  # ── Commit message ───────────────────────────────────────────────────
  # commitizen is the interactive CLI for writing conventional commits
  # (pip install commitizen && cz commit).
  # gitlint is the validation hook below — it checks messages against rules.
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        stages: [commit-msg]
